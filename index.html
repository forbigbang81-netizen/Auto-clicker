<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Greg Prox</title>
  <link rel="icon" id="favicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23e74c3c'/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="browser-container">
    <div class="header">
      <div class="clock" id="clock">00:00:00 PM</div>
      <div class="theme-name">Greg Prox v2.0.0</div>
    </div>
    
    <div class="address-bar">
      <div class="url-display" id="urlDisplay">education.fugas.pl</div>
      <input type="text" id="urlInput" placeholder="Search or enter URL..." value="https://www.youtube.com">
      <button id="goBtn" class="animate-hover">🔍</button>
    </div>

    <div class="quick-links">
      <div class="link-item" data-url="https://youtube.com">
        <div class="link-icon">▶️</div>
        <span>YouTube</span>
      </div>
      <div class="link-item" data-url="https://x.com">
        <div class="link-icon">🐦</div>
        <span>X</span>
      </div>
      <div class="link-item" data-url="https://github.com">
        <div class="link-icon">🐙</div>
        <span>GitHub</span>
      </div>
      <div class="link-item" data-url="https://google.com">
        <div class="link-icon">🔍</div>
        <span>Google</span>
      </div>
      <div class="link-item" data-url="https://wikipedia.org">
        <div class="link-icon">📚</div>
        <span>Wikipedia</span>
      </div>
      <div class="link-item" data-url="https://duckduckgo.com">
        <div class="link-icon">🦆</div>
        <span>DuckDuckGo</span>
      </div>
    </div>

    <div class="proxy-container">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Loading Greg Prox...</p>
      </div>
      <iframe id="proxyFrame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-navigation"></iframe>
    </div>

    <div class="footer">
      <span class="status">Ready</span>
      <span class="version">Greg Prox v2.0.0</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
